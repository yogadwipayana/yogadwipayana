# Reverse proxy for the Next.js custom server (server.mjs) running on :3000.
# The app is a single persistent Node process — no static-file offload — because
# it serves both HTTP and the SSH terminal WebSocket at /api/ssh/ws.

# Map the Upgrade header so WebSocket connections get "Connection: upgrade"
# while normal requests get "Connection: close". Required at http{} scope.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# "app" is the docker-compose service name, resolved via the compose network.
# On a bare host (nginx outside compose) change this to 127.0.0.1:3000.
upstream yogadwipayana_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name yogathedev.com www.yogathedev.com;

    # Cap request bodies (chat uploads, avatars). Raise if you need larger.
    client_max_body_size 25m;

    # SSH terminal WebSocket — long-lived, must not time out mid-session.
    location /api/ssh/ws {
        proxy_pass http://yogadwipayana_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # Everything else — normal HTTP + SSE (chat streaming).
    location / {
        proxy_pass http://yogadwipayana_app;
        proxy_http_version 1.1;

        # Also forward upgrade headers here so Next.js HMR / any other
        # WS route keeps working through the proxy.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (chat): disable response buffering so tokens stream to the client.
        proxy_buffering off;
        proxy_cache     off;

        proxy_read_timeout  300s;
    }
}
