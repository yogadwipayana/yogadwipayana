name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    # Gate behind a GitHub Environment so production has approvals + secrets.
    environment: production

    steps:
      - name: SSH into EC2 and pull latest
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.EC2_APP_DIR }}
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            npm ci --omit=dev
            npm run build
            # systemd unit defined in docs/deployment/yogadwipayana.service
            sudo systemctl restart yogadwipayana.service
